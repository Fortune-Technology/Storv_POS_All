directories:
  output: dist-electron
  buildResources: build
appId: com.storeveu.pos
productName: StoreVeu POS
copyright: Copyright © 2025 StoreVeu
forceCodeSigning: false
npmRebuild: true
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - public/icon.*
      - node_modules/serialport/**/*
      - node_modules/@serialport/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.ico
  shortcutName: StoreVeu POS
mac:
  target: dmg
linux:
  target: AppImage
electronVersion: 33.4.11
