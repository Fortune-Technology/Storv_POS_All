name: Deploy Storv POS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "cashier-app/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-storv-pos-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Update repo
        shell: bash
        run: |
          set -e
          cd /var/www/Storv_POS_All
          git fetch origin
          git reset --hard origin/main

      - name: Deploy backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/backend
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          pm2 restart storv-pos-backend
          pm2 save

      - name: Verify backend is running
        shell: bash
        run: |
          sleep 5
          curl -f http://localhost:5002/health || exit 1
          echo "✅ Backend is healthy"

      - name: Deploy frontend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/frontend
          rm -rf dist
          npm ci
          npm run build
          sudo systemctl reload nginx

      - name: Deploy cashier-app
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/cashier-app
          rm -rf dist
          npm ci
          npm run build
          sudo systemctl reload nginx

      - name: Verify deployments
        shell: bash
        run: |
          set -e
          echo "Checking all services..."
          curl -f https://api-pos.thefortunetech.com/health && echo "✅ API is up"
          curl -f https://dashboard.thefortunetech.com && echo "✅ Dashboard is up"
          curl -f https://pos.thefortunetech.com && echo "✅ POS is up"
          pm2 list

      - name: Notify success
        if: success()
        shell: bash
        run: |
          echo "🚀 Storv POS deployed successfully!"
          echo "Backend:    https://api-pos.thefortunetech.com"
          echo "Dashboard:  https://dashboard.thefortunetech.com"
          echo "POS:        https://pos.thefortunetech.com"

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          echo "❌ Deployment failed! Check logs above."
          pm2 logs storv-pos-backend --lines 50 --nostream