name: Deploy Storv POS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "cashier-app/**"
      - "admin-app/**"
      - "ecom-backend/**"
      - "storefront/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-storv-pos-main
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy web apps + backend to server
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Update repo
        shell: bash
        run: |
          set -e
          cd /var/www/Storv_POS_All
          git fetch origin
          git reset --hard origin/main

      # ── POS Backend ────────────────────────────────────────────────────
      - name: Deploy backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/backend
          rm -f package-lock.json
          npm install
          npx prisma generate

          # Run any pending SQL migrations (safe — all use IF NOT EXISTS)
          for f in prisma/migrations/*.sql; do
            if [ -f "$f" ]; then
              echo "Running migration: $f"
              npx prisma db execute --file "$f" --schema prisma/schema.prisma || echo "  ⚠ Migration $f had warnings (non-fatal)"
            fi
          done

          pm2 restart api-pos || pm2 restart storv-pos-backend || echo "PM2 restart attempted"
          pm2 save

      - name: Verify backend is running
        shell: bash
        run: |
          sleep 5
          curl -f http://localhost:5002/health || exit 1
          echo "Backend is healthy"

      # ── E-commerce Backend ─────────────────────────────────────────────
      - name: Deploy ecom-backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/ecom-backend
          rm -f package-lock.json
          npm install
          npx prisma generate
          npx prisma db push --accept-data-loss
          pm2 restart storv-ecom-backend || pm2 start src/server.js --name storv-ecom-backend
          pm2 save

      - name: Verify ecom-backend is running
        shell: bash
        run: |
          sleep 3
          curl -f http://localhost:5003/health || exit 1
          echo "Ecom backend is healthy"

      # ── Build all static apps before touching dist ─────────────────────
      - name: Build frontend + cashier + admin
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Storv_POS_All/frontend
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

          cd /var/www/Storv_POS_All/cashier-app
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

          cd /var/www/Storv_POS_All/admin-app
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

      # ── Swap dist atomically + reload Nginx + cleanup ──────────────────
      - name: Swap builds and reload Nginx
        shell: bash
        run: |
          set -e
          # Step 1: Rename old dist → dist_old (atomic, no lock issue)
          for app in frontend cashier-app admin-app; do
            cd /var/www/Storv_POS_All/$app
            mv dist dist_old 2>/dev/null || true
            mv dist_new dist
            cd /var/www/Storv_POS_All
          done
          # Step 2: Reload Nginx so it releases old file handles
          sudo systemctl reload nginx
          sleep 2
          # Step 3: Now safe to delete old files
          for app in frontend cashier-app admin-app; do
            rm -rf /var/www/Storv_POS_All/$app/dist_old
          done

      # ── Storefront (Next.js) ───────────────────────────────────────────
      - name: Deploy storefront
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/storefront
          rm -f package-lock.json
          npm install
          npm run build
          pm2 restart storv-storefront || pm2 start npm --name storv-storefront -- start
          pm2 save

      # ── Verify All Services ────────────────────────────────────────────
      - name: Verify deployments
        shell: bash
        run: |
          set -e
          echo "Checking all services..."
          curl -f https://api.storeveu.com/health && echo " ✓ Backend API"
          curl -f https://storeveu.com && echo " ✓ Dashboard"
          curl -f https://pos.storeveu.com && echo " ✓ POS"
          curl -f https://admin.storeveu.com && echo " ✓ Admin"
          curl -f https://shop-api.storeveu.com/health && echo " ✓ Ecom Backend"
          curl -f https://shop.storeveu.com && echo " ✓ Storefront"
          pm2 list

      - name: Notify success
        if: success()
        shell: bash
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ✅ Storv POS deployed successfully!          ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Backend:      https://api.storeveu.com      ║"
          echo "║  Dashboard:    https://storeveu.com           ║"
          echo "║  POS:          https://pos.storeveu.com       ║"
          echo "║  Admin:        https://admin.storeveu.com     ║"
          echo "║  Ecom Backend: https://shop-api.storeveu.com  ║"
          echo "║  Storefront:   https://shop.storeveu.com      ║"
          echo "╚══════════════════════════════════════════════╝"

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          echo "❌ Deployment failed! Check logs above."
          pm2 logs storv-pos-backend --lines 20 --nostream || true
          pm2 logs storv-ecom-backend --lines 20 --nostream || true
          pm2 logs storv-storefront --lines 20 --nostream || true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Build Electron desktop installer (Windows NSIS)
  # Runs in parallel with deploy. Builds on GitHub-hosted Windows runner,
  # deletes the previous "latest-desktop" release, then uploads the new .exe.
  # ──────────────────────────────────────────────────────────────────────────
  build-electron:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: cashier-app
        run: npm install

      - name: Build Vite + Electron installer
        working-directory: cashier-app
        run: npx vite build && npx electron-builder --publish never

      - name: Find installer file
        id: find-exe
        working-directory: cashier-app/dist-electron
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in dist-electron"; exit 1 }
          $version = (Get-Content ../package.json | ConvertFrom-Json).version
          $date = Get-Date -Format "yyyy-MM-dd"
          echo "EXE_PATH=cashier-app/dist-electron/$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "DATE=$date" >> $env:GITHUB_OUTPUT

      - name: Delete old "latest-desktop" release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-desktop --yes --cleanup-tag 2>/dev/null || true

      - name: Create new "latest-desktop" release with installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-desktop \
            "${{ steps.find-exe.outputs.EXE_PATH }}" \
            --title "StoreVeu POS Desktop v${{ steps.find-exe.outputs.VERSION }} (${{ steps.find-exe.outputs.DATE }})" \
            --notes "$(cat <<'EOF'
          ## StoreVeu POS — Windows Desktop Installer

          **Version:** ${{ steps.find-exe.outputs.VERSION }}
          **Built:** ${{ steps.find-exe.outputs.DATE }}
          **Commit:** ${{ github.sha }}

          ### Installation
          1. Download **${{ steps.find-exe.outputs.EXE_NAME }}** below
          2. Run the installer on your Windows POS machine
          3. Launch "StoreVeu POS" from the desktop shortcut
          4. Select your store and register the station on first launch

          ### What's included
          - Full POS terminal with offline support
          - USB and network receipt printing (ESC/POS)
          - Cash drawer integration
          - Barcode scanner support
          - Fullscreen kiosk mode in production

          > This release is automatically rebuilt on every push to main.
          > Previous installer is deleted and replaced.
          EOF
          )" \
            --latest

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Copy .exe installer to frontend so it's served from the website
  # Runs AFTER both deploy and build-electron finish successfully.
  # ──────────────────────────────────────────────────────────────────────────
  publish-installer:
    needs: [deploy, build-electron]
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Download installer from GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DOWNLOADS_DIR="/var/www/Storv_POS_All/frontend/dist/downloads"
          mkdir -p "$DOWNLOADS_DIR"

          # Remove old installer(s)
          rm -f "$DOWNLOADS_DIR"/*.exe

          # Download the latest .exe from the GitHub Release
          cd "$DOWNLOADS_DIR"
          gh release download latest-desktop -p "*.exe" --clobber \
            -R "$GITHUB_REPOSITORY"

          # Rename to a consistent filename for the website download link
          for f in *.exe; do
            if [ "$f" != "StoreVeu-POS-Setup.exe" ]; then
              mv "$f" StoreVeu-POS-Setup.exe
            fi
          done

          echo "✅ Installer published: $(ls -lh StoreVeu-POS-Setup.exe)"