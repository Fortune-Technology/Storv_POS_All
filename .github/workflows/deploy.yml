name: Deploy Storeveu POS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "cashier-app/**"
      - "admin-app/**"
      - "ecom-backend/**"
      - "storefront/**"
      - "marketing/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-storv-pos-main
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 0: Detect which paths changed in this push.
  # Only used to gate the expensive Windows Electron build — every other
  # job runs unconditionally because the workflow-level `paths:` filter
  # already covers the broad case.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      cashier-app: ${{ steps.filter.outputs.cashier-app }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need history so paths-filter can diff against the base SHA.
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cashier-app:
              - 'cashier-app/**'
              - '.github/workflows/deploy.yml'

  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy web apps + backend to server
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Update repo
        shell: bash
        run: |
          set -e
          cd /var/www/Storv_POS_All
          git fetch origin
          git reset --hard origin/main

      # ── POS Backend ────────────────────────────────────────────────────
      - name: Deploy backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/backend
          rm -f package-lock.json
          npm install
          npx prisma generate

          # Run any pending SQL migrations (safe — all use IF NOT EXISTS).
          # These handle data migrations / backfills and specific ALTERs that
          # need to run in order.
          for f in prisma/migrations/*.sql; do
            if [ -f "$f" ]; then
              echo "Running migration: $f"
              npx prisma db execute --file "$f" --schema prisma/schema.prisma || echo "  ⚠ Migration $f had warnings (non-fatal)"
            fi
          done

          # Sync any remaining schema changes — this is the safety net for
          # any additions (new tables, new columns) that weren't captured in
          # a SQL migration file. Idempotent: if the DB already matches the
          # Prisma schema, this is a no-op.
          # We use --accept-data-loss only because new optional columns on
          # existing tables can require it; the command never drops data
          # unless a column/table is actually removed from schema.prisma.
          echo "→ Running prisma db push to sync any remaining schema changes"
          npx prisma db push --accept-data-loss --skip-generate || {
            echo "::error::prisma db push failed — database schema is out of sync with Prisma client"
            exit 1
          }

          # Seed / refresh RBAC system roles + permission catalog.
          # Idempotent — creates missing roles, adds missing permission rows,
          # and syncs legacy `User.role` → UserRole assignments for every user.
          # Must run AFTER migrations so the roles / permissions tables exist.
          # All seed/backfill scripts are now .ts (Phase 4, April 2026) — must
          # run via `npx tsx`; plain `node` cannot execute TypeScript.
          echo "→ Running RBAC seed (creates missing system roles + perms)"
          npx tsx prisma/seedRbac.ts || echo "  ⚠ seedRbac.ts had warnings (non-fatal)"

          # Session 1 — Sync primary UPC → ProductUpc table for any legacy
          # products created before the merged Barcodes section shipped.
          # Safe: only creates missing default ProductUpc rows; skips products
          # already in sync and logs mismatches for manual review.
          echo "→ Running backfill: primary UPCs → ProductUpc"
          npx tsx prisma/backfillPrimaryUpcs.ts || echo "  ⚠ backfillPrimaryUpcs.ts had warnings (non-fatal)"

          # Session 4 — Seed alcohol / tobacco / beer / liquor dept attribute
          # presets + backfill Department.category for any fuzzy-matching dept.
          # Idempotent: upserts via (orgId, departmentId, key) unique and never
          # overwrites operator edits to existing attribute rows.
          echo "→ Running dept attributes seed (Wine/Liquor/Beer/Tobacco presets)"
          npx tsx prisma/seedDeptAttributes.ts || echo "  ⚠ seedDeptAttributes.ts had warnings (non-fatal)"

          # Session 5 — Seed the 3 built-in vendor import templates
          # (AGNE / Sante POS / Pine State). Idempotent via `slug` unique — will
          # skip any template slug that already exists, so operator edits via
          # /admin/vendor-templates are never clobbered by the deploy.
          echo "→ Running vendor templates seed (AGNE / Sante / Pine State)"
          npx tsx prisma/seedVendorTemplates.ts || echo "  ⚠ seedVendorTemplates.ts had warnings (non-fatal)"

          # Default Merchant Services Agreement — drives the admin "Generate
          # Contract" wizard. Idempotent: creates v1 only if the slug
          # 'merchant-services-agreement' is missing, otherwise bumps to a new
          # version when the source HTML or merge-field catalog changes.
          # Reads scripts/_contract_default.html (committed alongside this file).
          echo "→ Running contract template seed (Merchant Services Agreement)"
          npx tsx prisma/seedContractTemplates.ts || echo "  ⚠ seedContractTemplates.ts had warnings (non-fatal)"

          # Equipment product catalog (Billing → Equipment tab). Idempotent
          # upsert by `slug`; existing rows are NOT overwritten unless --force
          # is passed, so admin edits to price/description/images via the panel
          # survive deploys. Image files live in /var/www/.../uploads/devices/
          # outside the repo — DB stores only relative URL paths.
          echo "→ Running equipment catalog seed (POS terminal, printer, drawer, etc.)"
          npx tsx prisma/seedEquipment.ts || echo "  ⚠ seedEquipment.ts had warnings (non-fatal)"

          # S78 — Plan modules + subscription plan catalog (Starter / Growth /
          # Enterprise). Idempotent: upserts the PlatformModule rows and the
          # SubscriptionPlan rows + their PlanModule mappings. Required before
          # any plan-gating in the portal can resolve modules for a given org.
          echo "→ Running plan modules seed (PlatformModule + SubscriptionPlan + PlanModule)"
          npx tsx prisma/seedPlanModules.ts || echo "  ⚠ seedPlanModules.ts had warnings (non-fatal)"

          # One-shot migration — grant the Enterprise plan to every existing
          # organisation so they retain full sidebar access (Lottery / Fuel /
          # eCom / Exchange / etc.) after the plan-gating rollout.
          #
          # ⚠ Gated by a server-side sentinel file. Runs EXACTLY ONCE, ever.
          #
          # Why the gate: the script upserts every org to Enterprise, so without
          # this guard a customer downgraded by superadmin (e.g. moved to
          # Growth or Starter for billing reasons) would get silently bumped
          # back to Enterprise on every subsequent deploy. With the sentinel,
          # the script runs only on the first deploy after this commit lands,
          # then never again.
          #
          # To force a re-run (e.g. after onboarding a wave of new customers
          # who all need full access during a migration window):
          #   ssh prod && sudo rm /var/www/Storv_POS_All/.grant-enterprise-v1.done
          #   ...then push any change to main to trigger the next deploy.
          SENTINEL=/var/www/Storv_POS_All/.grant-enterprise-v1.done
          if [ -f "$SENTINEL" ]; then
            echo "→ Skipping grantEnterpriseToExistingOrgs (already ran on $(stat -c %y "$SENTINEL" 2>/dev/null || echo 'unknown date'))"
          else
            echo "→ First-time run: granting Enterprise plan to existing orgs"
            if npx tsx prisma/grantEnterpriseToExistingOrgs.ts; then
              touch "$SENTINEL"
              echo "✓ Sentinel created at $SENTINEL — won't run again on future deploys"
            else
              echo "  ⚠ grantEnterpriseToExistingOrgs.ts errored — sentinel NOT created so next deploy will retry"
            fi
          fi

          # S81 — ONE-TIME: every existing active store gets a Pro StoreSubscription.
          #
          # Same sentinel pattern as the Enterprise grant above. Runs on the
          # FIRST deploy after S81 lands, then never again. Real-world effect:
          #   • Stores with no StoreSubscription      → get Pro / active
          #   • Stores with Starter trial             → upgraded to Pro / active
          #   • Stores already on Pro / active        → no-op (script tally only)
          #   • Organization.plan='trial'/'basic'     → flipped to 'pro' for legacy parity
          #
          # Why gated: subsequent deploys must NOT bump admin-driven downgrades
          # (e.g. customer manually moved to Starter for billing) back up to Pro.
          # Without the sentinel, every deploy would silently overwrite that.
          #
          # To force re-run (e.g. another wave of beta customers needing full
          # access for a migration window):
          #   ssh prod && sudo rm /var/www/Storv_POS_All/.grant-pro-existing-stores-v1.done
          #   ...then push to main.
          PRO_SENTINEL=/var/www/Storv_POS_All/.grant-pro-existing-stores-v1.done
          if [ -f "$PRO_SENTINEL" ]; then
            echo "→ Skipping grantProToExistingStores (already ran on $(stat -c %y "$PRO_SENTINEL" 2>/dev/null || echo 'unknown date'))"
          else
            echo "→ First-time run: granting Pro StoreSubscription to existing stores"
            if npx tsx prisma/grantProToExistingStores.ts; then
              touch "$PRO_SENTINEL"
              echo "✓ Sentinel created at $PRO_SENTINEL — won't run again on future deploys"
            else
              echo "  ⚠ grantProToExistingStores.ts errored — sentinel NOT created so next deploy will retry"
            fi
          fi

          # PM2 restart — then VERIFY the process actually recycled. The old
          # `|| echo` fallback silently swallowed failures; PM2 would print
          # success messages even when the Node process hadn't truly
          # restarted, and deploys would drift with stale in-memory code
          # while the health check kept passing.
          PM2_NAME="api-pos"
          pm2 restart "$PM2_NAME" --update-env || pm2 restart storv-pos-backend --update-env || { echo "❌ PM2 restart failed"; exit 1; }
          pm2 save
          sleep 2
          # Uptime should be a small number now. If it's > 60s we didn't
          # actually restart — bail loudly so the deploy fails visibly.
          UPTIME_MS=$(pm2 jlist | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).find(p => p.name === '$PM2_NAME')?.pm2_env?.pm_uptime || 0")
          UPTIME_SEC=$(( ($(date +%s%3N) - UPTIME_MS) / 1000 ))
          echo "api-pos uptime after restart: ${UPTIME_SEC}s"
          if [ "$UPTIME_SEC" -gt 60 ]; then
            echo "❌ api-pos did NOT recycle (uptime > 60s). Backend is running stale code."
            echo "   Falling back to full re-create..."
            pm2 delete "$PM2_NAME" || true
            cd /var/www/Storv_POS_All/backend
            pm2 start npm --name "$PM2_NAME" -- start
            pm2 save
            sleep 3
          fi

      - name: Verify backend is running
        shell: bash
        run: |
          sleep 5
          curl -f http://localhost:5002/health || exit 1
          echo "Backend is healthy"

      # ── E-commerce Backend ─────────────────────────────────────────────
      - name: Deploy ecom-backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/ecom-backend
          rm -f package-lock.json
          npm install
          npx prisma generate

          # ── Safe baseline for existing production DB ─────────────────────
          # The ecom DB already has tables (pre-migrations era). Mark 0_init
          # as already-applied so migrate deploy doesn't try to recreate them.
          # `migrate resolve` only writes to _prisma_migrations — it never
          # runs DDL against your tables. Safe to re-run; errors if already
          # resolved, which we swallow.
          echo "→ Ensuring 0_init baseline is recorded in _prisma_migrations"
          npx prisma migrate resolve --applied 0_init 2>&1 || echo "  (already applied — OK)"

          npx prisma migrate deploy
          pm2 restart storv-ecom-backend || pm2 start src/server.js --name storv-ecom-backend
          pm2 save

      - name: Verify ecom-backend is running
        shell: bash
        run: |
          sleep 3
          curl -f http://localhost:5003/health || exit 1
          echo "Ecom backend is healthy"

      # ── Build all static apps before touching dist ─────────────────────
      - name: Build frontend + cashier + admin + marketing
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Storv_POS_All/frontend
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

          cd /var/www/Storv_POS_All/cashier-app
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

          cd /var/www/Storv_POS_All/admin-app
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

          cd /var/www/Storv_POS_All/marketing
          rm -f package-lock.json && npm install
          npm run build -- --outDir dist_new

      # ── Swap dist atomically + reload Nginx + cleanup ──────────────────
      - name: Swap builds and reload Nginx
        shell: bash
        run: |
          set -e
          for app in frontend cashier-app admin-app marketing; do
            APP_DIR="/var/www/Storv_POS_All/$app"

            # Nuke anything left over from previous failed deploys.
            # sudo because root-owned leftovers from prior partial deploys
            # silently fail otherwise and break the swap below.
            sudo rm -rf "$APP_DIR/dist_old"

            # Move current dist out of the way. -T forces target to be the
            # rename name (not "move into existing dir") so a leftover
            # dist_old can never cause dist to nest inside it.
            if [ -d "$APP_DIR/dist" ]; then
              mv -T "$APP_DIR/dist" "$APP_DIR/dist_old"
            fi

            # Promote new build to dist
            mv -T "$APP_DIR/dist_new" "$APP_DIR/dist"
          done

          # Reload Nginx so it picks up new files and releases old handles.
          # Use sudo -n (non-interactive) — requires passwordless sudo configured
          # on the runner for `systemctl reload nginx`. Falls back to `nginx -s reload`
          # if the runner user has direct nginx privileges instead.
          sudo -n systemctl reload nginx || nginx -s reload || {
            echo "❌ Failed to reload Nginx — neither sudo -n nor direct reload worked."
            echo "   Configure passwordless sudo for the runner user, e.g. in /etc/sudoers.d/github-runner:"
            echo "     <runner-user> ALL=(ALL) NOPASSWD: /bin/systemctl reload nginx, /bin/rm"
            exit 1
          }
          sleep 5

          # Now safe to delete old builds (Nginx has released file handles)
          for app in frontend cashier-app admin-app marketing; do
            sudo -n rm -rf "/var/www/Storv_POS_All/$app/dist_old" 2>/dev/null \
              || rm -rf "/var/www/Storv_POS_All/$app/dist_old" 2>/dev/null \
              || true
          done

      # ── Storefront (Next.js) ───────────────────────────────────────────
      - name: Deploy storefront
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd /var/www/Storv_POS_All/storefront
          # Nuke any previous .next that may be owned by root from an earlier
          # manual fix-up. Next.js' internal build cleanup fails with
          # "Permission denied" otherwise, aborting the whole deploy.
          rm -rf .next 2>/dev/null || rm -rf .next
          chown -R "$USER":"$USER" . 2>/dev/null || true
          rm -f package-lock.json
          # Wipe stale .next — prevents chunk-hash mismatches between a prior
          # build's artifacts and the new build (caused blank-page 404s locally).
          rm -rf .next
          npm install
          npm run build
          pm2 restart storv-storefront || pm2 start npm --name storv-storefront -- start
          pm2 save

      # ── Verify All Services ────────────────────────────────────────────
      - name: Verify deployments
        shell: bash
        run: |
          set -e
          echo "Checking all services..."
          curl -f https://api.storeveu.com/health     && echo " ✓ Backend API"
          curl -f https://dashboard.storeveu.com      && echo " ✓ Dashboard"
          curl -f https://pos.storeveu.com            && echo " ✓ POS"
          curl -f https://admin.storeveu.com          && echo " ✓ Admin"
          curl -f https://shop-api.storeveu.com/health && echo " ✓ Ecom Backend"
          curl -f https://shop.storeveu.com           && echo " ✓ Storefront"
          curl -f https://storeveu.com                && echo " ✓ Marketing"
          pm2 list

      - name: Notify success
        if: success()
        shell: bash
        run: |
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  ✅ Storeveu POS deployed successfully!             ║"
          echo "╠════════════════════════════════════════════════════╣"
          echo "║  Backend:      https://api.storeveu.com            ║"
          echo "║  Dashboard:    https://dashboard.storeveu.com      ║"
          echo "║  POS:          https://pos.storeveu.com            ║"
          echo "║  Admin:        https://admin.storeveu.com          ║"
          echo "║  Ecom Backend: https://shop-api.storeveu.com       ║"
          echo "║  Storefront:   https://shop.storeveu.com           ║"
          echo "║  Marketing:    https://storeveu.com                ║"
          echo "╚════════════════════════════════════════════════════╝"

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          echo "❌ Deployment failed! Check logs above."
          pm2 logs storv-pos-backend --lines 20 --nostream || true
          pm2 logs storv-ecom-backend --lines 20 --nostream || true
          pm2 logs storv-storefront --lines 20 --nostream || true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Build Electron desktop installer (Windows NSIS)
  # Runs in parallel with deploy. Builds on GitHub-hosted Windows runner,
  # deletes the previous "latest-desktop" release, then uploads the new .exe.
  #
  # Skipped when cashier-app/** is unchanged — saves ~5-10 min Windows
  # runner time per non-cashier deploy. The previous "latest-desktop"
  # release stays in place, so publish-installer below still re-publishes
  # the existing .exe to frontend/dist/downloads.
  # ──────────────────────────────────────────────────────────────────────────
  build-electron:
    needs: changes
    if: needs.changes.outputs.cashier-app == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python (for node-gyp native modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools (required by node-gyp)
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: cashier-app
        run: npm install

      # ──────────────────────────────────────────────────────────────────────
      # Auto-bump patch version using github.run_number.
      # Strategy:
      #   • Keep major.minor from package.json (you bump these manually for
      #     real releases — 1.x → 2.x for breaking changes, 1.0.x → 1.1.x for
      #     features). They live in source-of-truth git.
      #   • Replace the patch segment with github.run_number (strictly
      #     monotonic across the entire workflow — every run increments by 1).
      #
      # Why monotonic matters: electron-updater compares versions via semver.
      # If two pushes resulted in the same version string, the second build
      # would be invisible to installed apps. Using run_number guarantees
      # every successful build has a unique, strictly-greater version than
      # every prior one — installed clients see EVERY push as an update.
      #
      # Example: package.json says "1.0.0", current run_number is 195.
      #   → final version baked into the build: "1.0.195"
      #   → next push (run_number 196): "1.0.196"
      #
      # The bumped version is NOT committed back to the repo — it only lives
      # inside this workflow's checkout. package.json on main stays at the
      # "1.0.0" baseline, which is correct: that's the human-readable
      # "marketing version", and 1.0.195 etc. are CI build numbers.
      # ──────────────────────────────────────────────────────────────────────
      - name: Auto-bump patch version using run number
        working-directory: cashier-app
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node scripts/bumpVersion.mjs

      # ──────────────────────────────────────────────────────────────────────
      # Write .env.production on the runner.
      # The local copy is in .gitignore (so dev machines can override locally
      # without leaking creds), so CI must materialize it before `vite build`.
      # Without this, VITE_API_URL falls back to '/api' inside the Electron
      # bundle, which resolves to file:///C:/api/... on Windows install and
      # every API call ERR_FILE_NOT_FOUND. These URLs are public endpoints
      # (no secrets), safe to commit in the workflow.
      # ──────────────────────────────────────────────────────────────────────
      - name: Materialize .env.production for build
        working-directory: cashier-app
        shell: bash
        run: |
          cat > .env.production <<'EOF'
          VITE_API_URL=https://test.api.storeveu.com/api
          VITE_PORTAL_URL=https://test.dashboard.storeveu.com
          EOF
          echo "→ .env.production contents:"
          cat .env.production

      - name: Build Vite + Electron installer
        working-directory: cashier-app
        run: npx vite build && npx electron-builder --publish never

      - name: Verify API URL was baked into bundle
        working-directory: cashier-app
        shell: bash
        run: |
          if grep -qo "https://test\.api\.storeveu\.com/api" dist/assets/index-*.js; then
            echo "✓ Production API URL baked into bundle"
          else
            echo "::error::VITE_API_URL did NOT make it into the bundle — installer would 404"
            exit 1
          fi

      - name: Find installer + auto-update artifacts
        id: find-exe
        working-directory: cashier-app/dist-electron
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in dist-electron"; exit 1 }
          $version = (Get-Content ../package.json | ConvertFrom-Json).version
          $date = Get-Date -Format "yyyy-MM-dd"
          echo "EXE_PATH=cashier-app/dist-electron/$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "DATE=$date" >> $env:GITHUB_OUTPUT

          # electron-updater needs `latest.yml` + the per-build `.blockmap`
          # next to the .exe at runtime. Both are produced by electron-builder
          # automatically when a publish config is set in package.json (even
          # with --publish never — only the actual upload step is suppressed).
          $blockmap = Get-ChildItem -Filter "*.blockmap" | Select-Object -First 1
          if ($blockmap) {
            echo "BLOCKMAP_PATH=cashier-app/dist-electron/$($blockmap.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "No .blockmap found — differential updates will fall back to full download"
          }
          if (Test-Path "latest.yml") {
            echo "LATEST_YML_PATH=cashier-app/dist-electron/latest.yml" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "latest.yml missing — clients won't be able to detect updates"
            exit 1
          }

      - name: Delete old "latest-desktop" release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-desktop --yes --cleanup-tag 2>/dev/null || true

      - name: Create new "latest-desktop" release with installer + update manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload all auto-update artifacts: .exe (installer), latest.yml
          # (manifest electron-updater polls), and the .blockmap (differential
          # update map — clients only download changed bytes).
          # Use a bash array so paths with spaces ("StoreVeu POS Setup X.Y.Z.exe")
          # don't get word-split when expanded into the gh args.
          ARTIFACTS=(
            "${{ steps.find-exe.outputs.EXE_PATH }}"
            "${{ steps.find-exe.outputs.LATEST_YML_PATH }}"
          )
          if [ -n "${{ steps.find-exe.outputs.BLOCKMAP_PATH }}" ]; then
            ARTIFACTS+=( "${{ steps.find-exe.outputs.BLOCKMAP_PATH }}" )
          fi
          gh release create latest-desktop \
            "${ARTIFACTS[@]}" \
            --title "StoreVeu POS Desktop v${{ steps.find-exe.outputs.VERSION }} (${{ steps.find-exe.outputs.DATE }})" \
            --notes "$(cat <<'EOF'
          ## StoreVeu POS — Windows Desktop Installer

          **Version:** ${{ steps.find-exe.outputs.VERSION }}
          **Built:** ${{ steps.find-exe.outputs.DATE }}
          **Commit:** ${{ github.sha }}

          ### Installation
          1. Download **${{ steps.find-exe.outputs.EXE_NAME }}** below
          2. Run the installer on your Windows POS machine
          3. Launch "StoreVeu POS" from the desktop shortcut
          4. Select your store and register the station on first launch

          ### What's included
          - Full POS terminal with offline support
          - USB and network receipt printing (ESC/POS)
          - Cash drawer integration
          - Barcode scanner support
          - Fullscreen kiosk mode in production

          > This release is automatically rebuilt on every push to main.
          > Previous installer is deleted and replaced.
          EOF
          )" \
            --latest

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Copy .exe installer to frontend so it's served from the website
  # Runs AFTER deploy finishes. Tolerates a SKIPPED build-electron job —
  # in that case it re-downloads the existing "latest-desktop" GitHub release
  # so frontend/dist/downloads stays populated with the previous installer.
  # Only fails this step if deploy failed OR build-electron actively errored.
  # ──────────────────────────────────────────────────────────────────────────
  publish-installer:
    needs: [deploy, build-electron]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (needs.build-electron.result == 'success' || needs.build-electron.result == 'skipped')
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Publish installer + auto-update manifest from GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DOWNLOADS_DIR="/var/www/Storv_POS_All/frontend/dist/downloads"
          mkdir -p "$DOWNLOADS_DIR"

          # Wipe stale artifacts so removed files don't linger.
          # `2>/dev/null || true` swallows the "no match" error on first deploy.
          rm -f "$DOWNLOADS_DIR"/*.exe       2>/dev/null || true
          rm -f "$DOWNLOADS_DIR"/*.blockmap  2>/dev/null || true
          rm -f "$DOWNLOADS_DIR"/latest.yml  2>/dev/null || true

          # Pull every asset from the latest-desktop release in one shot.
          # `gh release download` handles URL-encoding, spaces in filenames,
          # auth, retries, and partial transfers for us.
          if ! gh release view latest-desktop >/dev/null 2>&1; then
            echo "⚠ No latest-desktop release exists yet — nothing to publish."
            exit 0
          fi

          echo "→ Downloading all assets from latest-desktop release…"
          gh release download latest-desktop \
            --dir "$DOWNLOADS_DIR" \
            --clobber \
            --pattern "*.exe" \
            --pattern "*.blockmap" \
            --pattern "latest.yml"

          # Find the downloaded .exe (filename includes version) and create
          # a stable alias so the manual-download page link doesn't break
          # on every version bump. Don't quote the glob — we want the shell
          # expansion. shopt nullglob makes the loop silent if there's no .exe.
          shopt -s nullglob
          installed=0
          for f in "$DOWNLOADS_DIR"/*.exe; do
            # Skip the stable-named alias if it already exists from a prior run
            [ "$(basename "$f")" = "StoreVeu-POS-Setup.exe" ] && continue
            cp "$f" "$DOWNLOADS_DIR/StoreVeu-POS-Setup.exe"
            installed=1
            break
          done
          shopt -u nullglob

          if [ "$installed" -eq 0 ]; then
            echo "⚠ No .exe found in release — manual-download alias not created."
          else
            echo "✓ Stable alias: StoreVeu-POS-Setup.exe"
          fi

          echo "✅ Published artifacts:"
          ls -lh "$DOWNLOADS_DIR" || true