name: Deploy Fortune POS Platform

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ft-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Update repo
        shell: bash
        run: |
          set -e
          cd /var/www/Fortune_POS_Platform
          git fetch origin
          git reset --hard origin/main

      - name: Deploy backend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/backend
          nvm use 20
          npm install
          npx prisma db push
          npm run db:seed -- default || true
          pm2 restart fortuneTech-backend
          pm2 save

      - name: Deploy frontend
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/frontend
          nvm use 20
          npm install
          rm -rf dist
          npm run build
          rm -rf /var/www/dashboard/*
          cp -r dist/* /var/www/dashboard/

      - name: Deploy POS
        shell: bash
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/cashier-app
          nvm use 20
          npm install
          rm -rf dist
          npm run build
          rm -rf /var/www/pos/*
          cp -r dist/* /var/www/pos/

      - name: Reload nginx
        run: sudo systemctl reload nginx