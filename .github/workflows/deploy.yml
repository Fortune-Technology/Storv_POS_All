name: Deploy Fortune POS Platform

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ft-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Update repo
        shell: bash
        run: |
          set -e
          cd /var/www/Fortune_POS_Platform
          git fetch origin
          git reset --hard origin/main

      # ---------------- BACKEND ----------------
      - name: Deploy backend
        shell: bash
        run: |
          set -e

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/backend
          nvm use 20

          echo "📦 Installing dependencies..."
          npm install

          echo "🗄️ Running Prisma..."
          npx prisma generate
          npx prisma db push

          echo "🌱 Seeding (safe)..."
          npm run seed || true

          echo "🔥 Killing rogue processes on port 5001..."
          fuser -k 5001/tcp || true

          echo "🚀 Restarting backend with PM2..."
          pm2 delete ft-backend || true
          pm2 start src/server.js --name ft-backend
          pm2 save

          echo "⏳ Waiting for server..."
          sleep 5

          echo "🧪 Health check..."
          curl -f http://localhost:5001/health

      # ---------------- DASHBOARD ----------------
      - name: Deploy dashboard frontend
        shell: bash
        run: |
          set -e

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/frontend
          nvm use 20

          echo "📦 Installing frontend deps..."
          npm install

          echo "🏗️ Building dashboard..."
          rm -rf dist
          npm run build

          echo "📂 Deploying dashboard..."
          rm -rf /var/www/dashboard/*
          cp -r dist/* /var/www/dashboard/

      # ---------------- POS ----------------
      - name: Deploy POS app
        shell: bash
        run: |
          set -e

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /var/www/Fortune_POS_Platform/cashier-app
          nvm use 20

          echo "📦 Installing POS deps..."
          npm install

          echo "🏗️ Building POS..."
          rm -rf dist
          npm run build

          echo "📂 Deploying POS..."
          rm -rf /var/www/pos/*
          cp -r dist/* /var/www/pos/

      # ---------------- NGINX ----------------
      - name: Reload nginx
        run: |
          echo "🔄 Reloading nginx..."
          sudo systemctl reload nginx

      # ---------------- SUCCESS ----------------
      - name: Deployment complete
        run: echo "✅ Fortune POS deployed successfully!"
